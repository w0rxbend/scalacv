<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="scalacv">
  <title>scalacv</title>
  <defs>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DC322F"/>
      <stop offset="100%" stop-color="#A32B29"/>
    </linearGradient>
  </defs>

  <!-- Aperture: six blades, the camera half of the mark. -->
  <g fill="none" stroke="url(#sweep)" stroke-width="9" stroke-linecap="round">
    <circle cx="100" cy="100" r="72" stroke-opacity="0.9"/>
  </g>
  <g fill="url(#sweep)" fill-opacity="0.85">
    <path d="M100 34 L143 59 L100 84 L57 59 Z"/>
    <path d="M157 66 L157 116 L114 91 L114 41 Z" transform="rotate(60 100 100)"/>
    <path d="M157 66 L157 116 L114 91 L114 41 Z" transform="rotate(180 100 100)"/>
  </g>

  <!-- Scala's stacked waves, sitting in the aperture's opening. -->
  <g fill="#FFFFFF">
    <path d="M74 84c17-5 35-5 52 0 0 6 0 11 0 17-17-5-35-5-52 0 0-6 0-11 0-17z" opacity="0.95"/>
    <path d="M74 108c17-5 35-5 52 0 0 6 0 11 0 17-17-5-35-5-52 0 0-6 0-11 0-17z" opacity="0.8"/>
  </g>
</svg>
