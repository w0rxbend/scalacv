name: Release

# Tag-driven publish to Maven Central via the Sonatype Central Portal. See RELEASING.md.
#
# The signing key and Central credentials are left as repository secrets to be filled in before
# the first release -- they are intentionally not present yet. Until they are, this workflow can
# be dispatched manually to dry-run the build and staging up to the point of upload.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      MILL_JVM_ID: zulu:25
      # TODO(release): add these as repository secrets before the first tag.
      MILL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      MILL_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
      MILL_PGP_SECRET_BASE64: ${{ secrets.PGP_SECRET_BASE64 }}
      MILL_PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # VcsVersion needs tags to compute the version
      - uses: coursier/cache-action@v8

      - name: Guard — exactly two modules may publish
        run: |
          n=$(./mill resolve "__:PublishModule.publishArtifacts" | grep -cE "^[a-z][a-zA-Z0-9-]*\.publishArtifacts$")
          echo "publishable modules: $n"
          test "$n" -eq 2

      - name: Report the version being released
        run: ./mill show core.publishVersion

      # Uncomment once the secrets above are populated. Staged as USER_MANAGED so the release is
      # inspected in the Central Portal before it goes live (RELEASING.md).
      # - name: Publish to Central (staged)
      #   run: ./mill mill.javalib.SonatypeCentralPublishModule/publishAll --publishArtifacts __.publishArtifacts --shouldRelease false
