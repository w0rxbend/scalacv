name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

# Mill 1.1.7 ignores JAVA_HOME and MILL_JVM_VERSION when it runs modules, and the
# //| mill-jvm-version: header in build.mill would otherwise freeze every rung of the
# matrix to one JDK. MILL_JVM_ID is read by build.mill to override it per rung, so
# actions/setup-java is deliberately absent from the JDK matrix below — it cannot
# steer Mill. See ROADMAP §2 and §4 G1.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: JDK ${{ matrix.jdk }} · ubuntu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: ["17", "21", "25"]
    env:
      MILL_JVM_ID: zulu:${{ matrix.jdk }}
    steps:
      - uses: actions/checkout@v7
      - uses: coursier/cache-action@v8

      - name: Compile
        # Explicit module list, not __: examples-gui pulls a per-host OpenJFX and must never be
        # built in CI (ROADMAP G4). __ would drag it in.
        run: ./mill core.compile zio.compile examples.compile

      - name: Assert the build really ran on JDK ${{ matrix.jdk }}
        # Without this the matrix is decorative: if the jvmId override ever stops being
        # honoured, all three rungs silently run the same JDK and still go green.
        run: ./mill examples.runMain scalacv.jvmReport | tee /dev/stderr | grep -q "java.version=${{ matrix.jdk }}"

      - name: Test
        run: ./mill core.test zio.test examples.test

      - name: Docs snippets still compile
        # The docs are a gate, not a courtesy: a code change that breaks an example fails here.
        run: ./mill docs.mdocCheck

      - name: Smoke — natives load with no GUI toolkit present
        # ubuntu-latest has no libgtk-x11-2.0. That is the point: this must pass anyway.
        # The success signal is the OK line, not the exit code: OpenCV/OpenBLAS native teardown
        # at JVM shutdown occasionally exits non-zero after a fully successful run. Capture then
        # grep -- a pipe would let mill's exit code fail the step under bash's pipefail even when
        # OK is present. A genuine load failure prints no OK, so this still fails loudly.
        run: |
          out=$(./mill examples.runMain scalacv.smoke 2>&1) || true
          echo "$out"
          echo "$out" | grep -q '^OK'

  style:
    name: Format and lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: coursier/cache-action@v8
      - name: scalafmt
        run: ./mill mill.scalalib.scalafmt.ScalafmtModule/checkFormatAll
      - name: scalafix
        # Scoped like the build job: examples-gui stays out of CI (ROADMAP G4).
        run: ./mill core.fix --check zio.fix --check examples.fix --check

  natives:
    name: Natives · macos-14
    runs-on: macos-14
    # macOS only. The headless loader is verified on linux-x86_64 by the build job; this leg
    # verifies the @rpath-resolved macOS path. Windows is deliberately absent: the `./mill`
    # bootstrap is a Unix-only launcher (it prints "supports only Linux and macOS" and exits),
    # and Mill 1.1.7 ships no Windows launcher, so a windows-latest leg would fail at the
    # launcher without exercising anything. The Windows loader path (a bulk-load fallback,
    # since the linker error names no library) is implemented but can only be verified on a
    # Windows host -- ROADMAP §7 item 15. Adding the leg back is a one-line change once a
    # working Windows Mill invocation exists.
    steps:
      - uses: actions/checkout@v7
      - uses: coursier/cache-action@v8
      - name: Smoke
        # Same as the ubuntu smoke: gate on the OK line, not mill's teardown-sensitive exit code.
        run: |
          out=$(./mill examples.runMain scalacv.smoke 2>&1) || true
          echo "$out"
          echo "$out" | grep -q '^OK'

  publish-shape:
    name: Published artifact shape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: coursier/cache-action@v8

      - name: Only core and zio may publish
        # examples and examples-gui must never reach Central; examples-gui's OpenJFX
        # resolves per-host and would be wrong for everyone who downloaded it.
        run: |
          modules=$(./mill resolve "__:PublishModule.publishArtifacts" | grep -cE "^[a-z][a-zA-Z0-9-]*\.publishArtifacts$")
          echo "publishable modules: $modules"
          test "$modules" -eq 2

      - name: POM dependency set
        # The failure this catches is invisible from inside the build: a classifier is
        # silently stripped from the POM, CI stays green because it compiles from source,
        # and every consumer resolves an artifact with no natives. ROADMAP §3.7.
        run: ./mill core.test.testOnly scalacv.PublishedPomTest

      - name: publishLocal
        run: ./mill __.publishLocal
