# Scala Steward configuration.

# The Scala version is deliberately pinned to the 3.3.x LTS line for the published artifact
# (ROADMAP D2 / §3.1): a Next-line 3.x cannot be consumed from 3.3.x LTS. Do not let Steward
# bump it off the LTS line automatically.
updates.pin = [
  { groupId = "org.scala-lang", artifactId = "scala3-library", version = "3.3." },
  { groupId = "org.scala-lang", artifactId = "scala3-compiler", version = "3.3." }
]

# The OpenCV binding version string is <opencv>-<presets>; only bytedeco cuts these, so let
# Steward propose them but review by hand -- a bump changes the native ABI.
updates.ignore = [
  { groupId = "org.bytedeco", artifactId = "opencv-platform" }
]

commits.message = "build: update ${artifactName} to ${nextVersion}"
